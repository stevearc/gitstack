[tox]
envlist = py310, py311, py312, py313, py314
skipsdist = true

[testenv]
skip_install = true
deps = -rrequirements_test.txt
commands =
    ruff format --check gitstack.py test_scenarios.py
    ruff check gitstack.py test_scenarios.py
    mypy gitstack.py test_scenarios.py
    pylint --rcfile=.pylintrc gitstack.py

[testenv:format]
skip_install = true
commands =
    ruff check --fix gitstack.py test_scenarios.py
    ruff format gitstack.py test_scenarios.py

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314
